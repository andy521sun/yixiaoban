services:
  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0
    container_name: yixiaoban_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: yixiaoban
      MYSQL_USER: yixiaoban
      MYSQL_PASSWORD: yixiaoban123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: |
      --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - yixiaoban_net

  # ==================== 后端API ====================
  backend:
    build: .
    container_name: yixiaoban_backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: yixiaoban
      DB_PASSWORD: yixiaoban123
      DB_NAME: yixiaoban
      JWT_SECRET: yixiaoban_jwt_secret_20240331
      SERVER_DOMAIN: https://andysun521.online
    ports:
      - "3000:3000"
    networks:
      - yixiaoban_net

  # ==================== Nginx ====================
  nginx:
    image: nginx:alpine
    container_name: yixiaoban_nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - yixiaoban_net

# ==================== 数据持久化 ====================
volumes:
  mysql_data:

# ==================== 网络 ====================
networks:
  yixiaoban_net:
    driver: bridge
