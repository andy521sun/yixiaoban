<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <base href="/">
  <title>医小伴 - 管理后台</title>
  <style>
    body { margin: 0; padding: 0; background: #f5f5f5; }
    .loading { display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
    .loading-spinner { width: 48px; height: 48px; border: 4px solid #e0e0e0; border-top-color: #1A73E8; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { margin-top: 16px; color: #666; font-family: -apple-system, sans-serif; font-size: 14px; }
  </style>
  <script>
    // 配置API基础路径
    window.flutterConfiguration = {
      apiBaseUrl: '/api'
    };
  </script>
</head>
<body>
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">医小伴管理后台加载中...</div>
  </div>
  <script src="main.dart.js" type="application/javascript"></script>
</body>
</html>
