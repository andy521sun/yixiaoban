# HTTPS 重定向
server {
    listen 80;
    server_name andysun521.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name andysun521.online;

    ssl_certificate /etc/letsencrypt/live/andysun521.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/andysun521.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 安全头
    add_header Strict-Transport-Security "max-age=63072000" always;

    # 健康检查
    location = /health {
        proxy_pass http://yixiaoban_backend:3000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API接口
    location /api {
        proxy_pass http://yixiaoban_backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws {
        proxy_pass http://yixiaoban_backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Flutter/构建文件 — 哈希文件长期缓存（main.dart.js, assets/*.js, assets/*.wasm）
    location ~* /(patient|companion)/(assets|flutter_service_worker)\.?.*\.(js|wasm|json|png|jpg|svg|ico|css)$ {
        proxy_pass http://yixiaoban_backend:3000;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Flutter/构建文件 — 非哈希文件短期缓存
    location ~* /(patient|companion)/(flutter\.js|main\.dart\.js|index\.html|manifest\.json)$ {
        proxy_pass http://yixiaoban_backend:3000;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # admin 管理后台 SPA 资源
    location ~* /admin/assets/ {
        proxy_pass http://yixiaoban_backend:3000;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # admin SPA index.html（no-cache 确保每次获取最新版本）
    location /admin/index.html {
        proxy_pass http://yixiaoban_backend:3000;
        proxy_set_header Host $host;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # 静态页面（其余全部走后端 SPA fallback）
    location / {
        proxy_pass http://yixiaoban_backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
